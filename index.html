      #app-loader{position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;background:#faf8f3;transition:opacity .35s ease}

      #app-loader .ml{font-family:'DM Sans',system-ui,-apple-system,Segoe UI,sans-serif;font-weight:900;font-size:34px;color:#26215C;letter-spacing:-1px;position:relative}
      #app-loader .ml::after{content:'';position:absolute;left:0;right:15px;bottom:-4px;height:3px;border-radius:2px;background:#534AB7}
      #app-loader .dot{position:absolute;top:2px;right:0;width:7px;height:7px;border-radius:50%;background:#1D9E75;animation:mlpulse 1s ease-in-out infinite}
      @keyframes mlpulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.35;transform:scale(.7)}}
    </style>
